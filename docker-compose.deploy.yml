# Self-host from prebuilt GHCR images — no source checkout, no local build.
#
#   1. curl -O https://raw.githubusercontent.com/sim186/artifactbay/main/docker-compose.deploy.yml
#   2. curl -O https://raw.githubusercontent.com/sim186/artifactbay/main/.env.deploy.example
#   3. mv .env.deploy.example .env  &&  edit the secrets
#   4. docker compose -f docker-compose.deploy.yml up -d
#      → web on http://localhost:${ARTIFACTBAY_WEB_PORT:-8080}
#
# Pin a release by setting ARTIFACTBAY_IMAGE_TAG=v1.2.3 (defaults to :latest).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-artifactbay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-artifactbay}
    volumes:
      - artifactbay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artifactbay} -d ${POSTGRES_DB:-artifactbay}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    image: ghcr.io/sim186/artifactbay-backend:${ARTIFACTBAY_IMAGE_TAG:-latest}
    environment:
      ARTIFACTBAY_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-artifactbay}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-artifactbay}
      # Public origin used to build share/artifact URLs — set to your real https host.
      ARTIFACTBAY_BASE_URL: ${ARTIFACTBAY_BASE_URL:?set ARTIFACTBAY_BASE_URL in .env}
      ARTIFACTBAY_API_KEY: ${ARTIFACTBAY_API_KEY:?set ARTIFACTBAY_API_KEY in .env}
      ARTIFACTBAY_JWT_SECRET: ${ARTIFACTBAY_JWT_SECRET:?set ARTIFACTBAY_JWT_SECRET in .env}
      ARTIFACTBAY_ADMIN_USERNAME: ${ARTIFACTBAY_ADMIN_USERNAME:-admin}
      ARTIFACTBAY_ADMIN_PASSWORD: ${ARTIFACTBAY_ADMIN_PASSWORD:?set ARTIFACTBAY_ADMIN_PASSWORD in .env}
      # Behind TLS the auth cookie should be Secure.
      ARTIFACTBAY_COOKIE_SECURE: ${ARTIFACTBAY_COOKIE_SECURE:-true}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    image: ghcr.io/sim186/artifactbay-web:${ARTIFACTBAY_IMAGE_TAG:-latest}
    ports:
      - "${ARTIFACTBAY_WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  artifactbay-pgdata:
