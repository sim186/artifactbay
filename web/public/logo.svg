<svg xmlns="http://www.w3.org/2000/svg" width="360" height="100" viewBox="0 0 360 100" role="img" aria-label="Foundry">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2233"/>
      <stop offset="1" stop-color="#10131c"/>
    </linearGradient>
    <linearGradient id="lava" x1="0.08" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffc24f"/>
      <stop offset="0.38" stop-color="#ff8a2e"/>
      <stop offset="0.72" stop-color="#ec4a0d"/>
      <stop offset="1" stop-color="#8f2009"/>
    </linearGradient>
    <filter id="heat" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>
  </defs>
  <!-- mark -->
  <g transform="translate(6 6)">
    <rect x="0" y="0" width="88" height="88" rx="26" fill="url(#tile)" stroke="#6366f1" stroke-width="2.4"/>
    <path d="M34 24 H60 M34 24 V68 M34 45 H54" fill="none" stroke="url(#lava)" stroke-width="9.5" stroke-linecap="round" filter="url(#heat)" opacity="0.55"/>
    <path d="M34 24 H60 M34 24 V68 M34 45 H54" fill="none" stroke="url(#lava)" stroke-width="9.5" stroke-linecap="round"/>
  </g>
  <!-- wordmark -->
  <text x="116" y="63" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="-1.5" fill="#e6e9ef">Foundry</text>
</svg>
